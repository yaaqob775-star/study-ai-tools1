<!DOCTYPE html>
<html>
<head>
  <title>PDF Tools</title>

  <meta name="theme-color" content="#111827">

  <style>
    body { font-family: Arial; text-align: center; margin:0; }
    header { background:#111827; color:white; padding:20px; }
    iframe { width:90%; height:500px; border:none; }
  </style>
</head>

<body>

<header>PDF Viewer 📄</header>

<input type="file" id="file" accept="application/pdf">

<iframe id="viewer"></iframe>

<script>
file.onchange = function(){
  viewer.src = URL.createObjectURL(this.files[0]);
}
</script>

</body>
</html>
