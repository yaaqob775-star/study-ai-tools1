<!DOCTYPE html>
<html>
<head>
  <title>PDF Tools</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f4f4;
      margin: 0;
    }

    header {
      background: #1f1f1f;
      color: white;
      padding: 20px;
      font-size: 24px;
    }

    .box {
      margin-top: 40px;
    }

    input {
      margin-top: 20px;
    }

    iframe {
      margin-top: 20px;
      width: 90%;
      height: 500px;
      border: none;
    }
  </style>
</head>

<body>

  <header>
    PDF Viewer 📄
  </header>

  <div class="box">

    <p>ارفع ملف PDF من جهازك</p>

    <input type="file" id="fileInput" accept="application/pdf">

    <br>

    <iframe id="viewer"></iframe>

  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const viewer = document.getElementById("viewer");

    fileInput.addEventListener("change", function () {
      const file = this.files[0];
      if (file) {
        const fileURL = URL.createObjectURL(file);
        viewer.src = fileURL;
      }
    });
  </script>

</body>
</html>
