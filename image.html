<!DOCTYPE html>
<html>
<head>
  <title>Image Tools</title>

  <meta name="theme-color" content="#111827">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      background: #111827;
      padding: 20px;
    }

    img {
      max-width: 90%;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>Image Tools 🖼</header>

<input type="file" id="imgInput" accept="image/*">

<img id="preview">

<script>
document.getElementById("imgInput").onchange = function () {
  let file = this.files[0];
  if (file) {
    document.getElementById("preview").src = URL.createObjectURL(file);
  }
}
</script>

</body>
</html>
