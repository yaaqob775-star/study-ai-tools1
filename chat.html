<!DOCTYPE html>
<html>
<head>
  <title>AI Study Assistant</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0b1220;
      color: white;
    }

    header {
      background: #111827;
      padding: 18px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .chat-box {
      max-width: 520px;
      margin: 20px auto;
      background: #1f2937;
      padding: 15px;
      border-radius: 12px;
      height: 420px;
      overflow-y: auto;
    }

    .msg {
      margin: 8px 0;
      padding: 10px;
      border-radius: 10px;
      line-height: 1.5;
    }

    .user {
      background: #2563eb;
      text-align: right;
    }

    .bot {
      background: #16a34a;
      text-align: left;
      white-space: pre-line;
    }

    .input-box {
      display: flex;
      max-width: 520px;
      margin: auto;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }

    .hint {
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      margin-top: 6px;
    }
  </style>
</head>

<body>

  <header>
    AI Study Assistant 📚🤖
  </header>

  <div class="chat-box" id="chat"></div>

  <div class="input-box">
    <input type="text" id="input" placeholder="اكتب سؤالك الدراسي...">
    <button onclick="send()">إرسال</button>
  </div>

  <p class="hint">اسأل: رياضيات، إنجليزي، برمجة، أو أي شرح 👍</p>

  <script>
    let memory = [];

    function send() {
      let input = document.getElementById("input");
      let chat = document.getElementById("chat");

      let text = input.value.trim();
      if (!text) return;

      memory.push(text);

      chat.innerHTML += <div class='msg user'>أنت: ${text}</div>;

      setTimeout(() => {
        chat.innerHTML += <div class='msg bot'>${getReply(text)}</div>;
        chat.scrollTop = chat.scrollHeight;
      }, 500);

      input.value = "";
    }

    function getReply(text) {
      let t = text.toLowerCase();

      // --- تعريف عام ---
      if (t.includes("من أنت")) {
        return "أنا مساعد دراسي ذكي داخل موقعك 🤖 أشرح وأحل وأسهل عليك الدراسة.";
      }

      // --- برمجة ---
      if (t.includes("html")) {
        return "📘 HTML:\nهي لغة بناء صفحات الويب.\nتستخدم لإنشاء الهيكل مثل العناوين والنصوص والصور.";
      }

      if (t.includes("css")) {
        return "🎨 CSS:\nتستخدم لتجميل الموقع مثل الألوان، الخطوط، والتنسيق.";
      }

      if (t.includes("javascript") || t.includes("js")) {
        return "⚡ JavaScript:\nتجعل الموقع تفاعلي (أزرار، شات، حركات).";
      }

      // --- رياضيات ---
      if (t.includes("رياضيات")) {
        return "📊 الرياضيات:\nاكتب السؤال وسأحلّه لك خطوة خطوة مع شرح بسيط 👍";
      }

      // --- إنجليزي ---
      if (t.includes("انجليزي")) {
        return "📘 English:\nأقدر أترجم وأشرح القواعد والكلمات خطوة خطوة.";
      }

      // --- شرح عام ---
      if (t.includes("اشرح") || t.includes("كيف")) {
        return "أكيد 👍\nاكتب السؤال وسأشرحه لك بشكل بسيط خطوة خطوة.";
      }

      // --- PDF ---
      if (t.includes("pdf")) {
        return "📄 استخدم PDF Tools من الصفحة الرئيسية.";
      }

      // --- Image ---
      if (t.includes("صورة") || t.includes("image")) {
        return "🖼️ استخدم Image Tools من الصفحة الرئيسية.";
      }

      // --- ذاكرة بسيطة ---
      if (t.includes("قلت")) {
        return "أنت قلت قبل: " + memory[Math.max(0, memory.length - 2)];
      }

      // --- افتراضي ذكي ---
      return "🤖 أنا مساعد دراسي وأفهم أكثر مع الوقت.\nاكتب سؤالك بشكل أوضح وسأشرح لك خطوة خطوة.";
    }
  </script>

</body>
</html>
