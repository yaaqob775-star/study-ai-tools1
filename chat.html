<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0b1220;
      color: white;
    }

    header {
      background: #111827;
      padding: 18px;
      text-align: center;
      font-size: 22px;
    }

    .chat-box {
      max-width: 520px;
      margin: 20px auto;
      background: #0f172a;
      padding: 15px;
      border-radius: 12px;
      height: 450px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      padding: 12px;
      border-radius: 12px;
      max-width: 80%;
    }

    .user {
      background: #2563eb;
      align-self: flex-end;
    }

    .bot {
      background: #16a34a;
      align-self: flex-start;
    }

    .input-box {
      display: flex;
      max-width: 520px;
      margin: auto;
    }

    input {
      flex: 1;
      padding: 12px;
      border: 1px solid #333;
    }

    button {
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>AI Chat 🤖</header>

<div class="chat-box" id="chat"></div>

<div class="input-box">
  <input id="input" placeholder="اكتب هنا...">
  <button id="btn">إرسال</button>
</div>

<script>
document.getElementById("btn").addEventListener("click", send);

function send() {
  let input = document.getElementById("input");
  let chat = document.getElementById("chat");

  let text = input.value.trim();
  if (!text) return;

  chat.innerHTML += <div class="msg user">أنت: ${text}</div>;
  input.value = "";

  let reply = getReply(text);

  chat.innerHTML += <div class="msg bot">${reply}</div>;
  chat.scrollTop = chat.scrollHeight;
}

function getReply(text) {
  text = text.toLowerCase();

  if (text.includes("مرحبا")) return "أهلاً 👋";
  if (text.includes("html")) return "HTML هي لغة بناء صفحات الويب";
  if (text.includes("css")) return "CSS لتنسيق المواقع";
  if (text.includes("javascript")) return "JavaScript تجعل الموقع تفاعلي";

  return "اكتب سؤال أوضح 👍";
}
</script>

</body>
</html>
