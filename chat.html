<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 24px;
    }

    .chat-box {
      max-width: 500px;
      margin: 20px auto;
      background: white;
      padding: 15px;
      border-radius: 10px;
      height: 420px;
      overflow-y: auto;
    }

    .msg {
      margin: 10px 0;
      padding: 8px;
      border-radius: 8px;
    }

    .user {
      text-align: right;
      background: #dbeafe;
    }

    .bot {
      text-align: left;
      background: #dcfce7;
    }

    .input-box {
      display: flex;
      max-width: 500px;
      margin: auto;
    }

    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

  <header>
    AI Chat 🤖
  </header>

  <div class="chat-box" id="chat"></div>

  <div class="input-box">
    <input type="text" id="input" placeholder="اكتب رسالتك...">
    <button onclick="send()">إرسال</button>
  </div>

  <script>
    function send() {
      let input = document.getElementById("input");
      let chat = document.getElementById("chat");

      let text = input.value.trim();
      if (!text) return;

      chat.innerHTML += <div class='msg user'>أنت: ${text}</div>;

      let reply = getReply(text.toLowerCase());

      setTimeout(() => {
        chat.innerHTML += <div class='msg bot'>AI: ${reply}</div>;
        chat.scrollTop = chat.scrollHeight;
      }, 500);

      input.value = "";
    }

    function getReply(text) {
      if (text.includes("مرحبا") || text.includes("hello")) {
        return "أهلاً بك 👋 كيف أقدر أساعدك؟";
      }

      if (text.includes("اسمك")) {
        return "أنا مساعد ذكي داخل موقعك 🤖";
      }

      if (text.includes("pdf")) {
        return "روح إلى PDF Tools 📄 من الصفحة الرئيسية";
      }

      if (text.includes("موقع")) {
        return "هذا مشروع AI Tools Hub خاص بك 🚀";
      }

      return "أنا ما زلت أتعلم 🤖 لكني سأتحسن مع الوقت!";
    }
  </script>

</body>
</html>
