<!DOCTYPE html>
<html>
<head>
  <title>AI Chat Pro</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0b1220;
      color: white;
    }

    header {
      background: #111827;
      padding: 18px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .chat-box {
      max-width: 500px;
      margin: 20px auto;
      background: #1f2937;
      padding: 15px;
      border-radius: 12px;
      height: 420px;
      overflow-y: auto;
    }

    .msg {
      margin: 8px 0;
      padding: 10px;
      border-radius: 10px;
    }

    .user {
      background: #2563eb;
      text-align: right;
    }

    .bot {
      background: #16a34a;
      text-align: left;
    }

    .input-box {
      display: flex;
      max-width: 500px;
      margin: auto;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
    }

    .hint {
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <header>
    AI Chat Pro 🤖
  </header>

  <div class="chat-box" id="chat"></div>

  <div class="input-box">
    <input type="text" id="input" placeholder="اكتب سؤالك...">
    <button onclick="send()">إرسال</button>
  </div>

  <p class="hint">اسأل عن البرمجة، الدراسة، أو أي شيء 👍</p>

  <script>
    function send() {
      let input = document.getElementById("input");
      let chat = document.getElementById("chat");

      let text = input.value.trim();
      if (!text) return;

      chat.innerHTML += <div class='msg user'>أنت: ${text}</div>;

      setTimeout(() => {
        chat.innerHTML += <div class='msg bot'>AI: ${getReply(text)}</div>;
        chat.scrollTop = chat.scrollHeight;
      }, 500);

      input.value = "";
    }

    function getReply(text) {
      let t = text.toLowerCase();

      // --- تعليم برمجة ---
      if (t.includes("html")) {
        return "HTML هي لغة بناء صفحات الويب 🌐 وتستخدم لهيكلة المحتوى.";
      }

      if (t.includes("css")) {
        return "CSS تستخدم لتصميم وتنسيق المواقع 🎨 مثل الألوان والخطوط.";
      }

      if (t.includes("javascript") || t.includes("js")) {
        return "JavaScript تجعل الموقع تفاعلي مثل هذا الشات 🤖";
      }

      // --- شرح عام ---
      if (t.includes("اشرح") || t.includes("كيف")) {
        return "أكيد 👍 اكتب لي الموضوع وأنا أشرحه لك خطوة خطوة.";
      }

      // --- دراسي ---
      if (t.includes("رياضيات")) {
        return "أقدر أساعدك في الرياضيات 👍 اكتب السؤال وسأحلّه لك خطوة خطوة.";
      }

      if (t.includes("انجليزي")) {
        return "أقدر أساعدك في الإنجليزي: ترجمة، قواعد، أو شرح كلمات 👍";
      }

      // --- الموقع ---
      if (t.includes("pdf")) {
        return "روح إلى PDF Tools من الصفحة الرئيسية 📄";
      }

      if (t.includes("image")) {
        return "روح إلى Image Tools 🖼️";
      }

      // --- عام ---
      if (t.includes("مرحبا") || t.includes("hello")) {
        return "أهلاً بك 👋 أنا مساعدك الذكي داخل الموقع.";
      }

      return "أنا أفهم أكثر الآن 🤖 اكتب سؤال أوضح وسأساعدك أفضل.";
    }
  </script>

</body>
</html>
