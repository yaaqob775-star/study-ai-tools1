<!DOCTYPE html>
<html>
<head>
  <title>AI Chat Pro</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0b1220;
      color: white;
    }

    header {
      background: #111827;
      padding: 18px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .chat-box {
      max-width: 500px;
      margin: 20px auto;
      background: #1f2937;
      padding: 15px;
      border-radius: 12px;
      height: 420px;
      overflow-y: auto;
    }

    .msg {
      margin: 8px 0;
      padding: 10px;
      border-radius: 10px;
    }

    .user {
      background: #2563eb;
      text-align: right;
    }

    .bot {
      background: #16a34a;
      text-align: left;
    }

    .input-box {
      display: flex;
      max-width: 500px;
      margin: auto;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

  <header>
    AI Chat Pro 🤖 (Memory Mode)
  </header>

  <div class="chat-box" id="chat"></div>

  <div class="input-box">
    <input type="text" id="input" placeholder="اكتب سؤالك...">
    <button onclick="send()">إرسال</button>
  </div>

  <script>
    let memory = [];

    function send() {
      let input = document.getElementById("input");
      let chat = document.getElementById("chat");

      let text = input.value.trim();
      if (!text) return;

      memory.push(text);

      chat.innerHTML += <div class='msg user'>أنت: ${text}</div>;

      setTimeout(() => {
        chat.innerHTML += <div class='msg bot'>AI: ${getReply(text)}</div>;
        chat.scrollTop = chat.scrollHeight;
      }, 400);

      input.value = "";
    }

    function getReply(text) {
      let t = text.toLowerCase();

      // --- ذاكرة ---
      if (t.includes("قلت")) {
        return "أنت قلت سابقًا: " + memory[memory.length - 2];
      }

      // --- تعليم ---
      if (t.includes("html")) return "HTML هي لغة بناء صفحات الويب 🌐";
      if (t.includes("css")) return "CSS لتنسيق المواقع 🎨";
      if (t.includes("js")) return "JavaScript تجعل الموقع تفاعلي 🤖";

      // --- دراسة ---
      if (t.includes("رياضيات")) return "أقدر أساعدك في الرياضيات خطوة خطوة 👍";
      if (t.includes("انجليزي")) return "أقدر أشرح لك الإنجليزي وترجماته 👍";

      // --- أدوات ---
      if (t.includes("pdf")) return "اذهب إلى PDF Tools 📄";
      if (t.includes("image")) return "اذهب إلى Image Tools 🖼️";

      // --- عام ---
      if (t.includes("مرحبا")) return "أهلاً بك 👋";

      return "أنا أتعلم من محادثتك 🤖 وأتحسن مع الوقت!";
    }
  </script>

</body>
</html>
