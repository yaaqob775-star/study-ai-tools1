<!DOCTYPE html>
<html>
<head>
  <title>AI Chat Pro</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0b1220;
      color: white;
    }

    header {
      background: #111827;
      padding: 18px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .chat-box {
      max-width: 500px;
      margin: 20px auto;
      background: #1f2937;
      padding: 15px;
      border-radius: 12px;
      height: 420px;
      overflow-y: auto;
    }

    .msg {
      margin: 8px 0;
      padding: 10px;
      border-radius: 10px;
    }

    .user {
      background: #2563eb;
      text-align: right;
    }

    .bot {
      background: #16a34a;
      text-align: left;
    }

    .input-box {
      display: flex;
      max-width: 500px;
      margin: auto;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

  <header>
    AI Chat Pro 🤖
  </header>

  <div class="chat-box" id="chat"></div>

  <div class="input-box">
    <input type="text" id="input" placeholder="اكتب سؤالك...">
    <button onclick="send()">إرسال</button>
  </div>

  <script>
    function send() {
      let input = document.getElementById("input");
      let chat = document.getElementById("chat");

      let text = input.value.trim();
      if (!text) return;

      chat.innerHTML += <div class='msg user'>أنت: ${text}</div>;

      setTimeout(() => {
        chat.innerHTML += <div class='msg bot'>AI: ${getReply(text)}</div>;
        chat.scrollTop = chat.scrollHeight;
      }, 400);

      input.value = "";
    }

    function getReply(text) {
      text = text.toLowerCase();

      // تعليم ذكي
      if (text.includes("html")) {
        return "HTML هي لغة بناء صفحات الويب 🌐 وتستخدم لهيكلة المحتوى.";
      }

      if (text.includes("css")) {
        return "CSS تستخدم لتنسيق وتصميم الصفحات 🎨 مثل الألوان والحجم.";
      }

      if (text.includes("js") || text.includes("javascript")) {
        return "JavaScript تجعل الموقع تفاعلي مثل هذا الشات 🤖";
      }

      // PDF
      if (text.includes("pdf")) {
        return "تقدر تستخدم PDF Tools من الصفحة الرئيسية 📄";
      }

      // شرح عام
      if (text.includes("اشرح") || text.includes("كيف")) {
        return "أكيد 👍 قل لي الموضوع وأنا أشرحه لك خطوة خطوة.";
      }

      // دعم
      if (text.includes("مرحبا") || text.includes("hello")) {
        return "أهلاً بك 👋 أنا مساعدك داخل الموقع.";
      }

      return "أنا مساعد ذكي بسيط داخل مشروعك 🤖 لكني أتعلم وأتحسن مع الوقت.";
    }
  </script>

</body>
</html>
