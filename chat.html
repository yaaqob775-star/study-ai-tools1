<!DOCTYPE html>
<html>
<head>
  <title>AI Chat Free</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 24px;
    }

    .chat-box {
      max-width: 500px;
      margin: 20px auto;
      background: white;
      padding: 15px;
      border-radius: 10px;
      height: 420px;
      overflow-y: auto;
    }

    .msg {
      margin: 8px 0;
      padding: 8px;
      border-radius: 8px;
    }

    .user {
      text-align: right;
      background: #dbeafe;
    }

    .bot {
      text-align: left;
      background: #dcfce7;
    }

    .input-box {
      display: flex;
      max-width: 500px;
      margin: auto;
    }

    input {
      flex: 1;
      padding: 10px;
    }

    button {
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

  <header>
    AI Chat 🤖 (Free Smart Version)
  </header>

  <div class="chat-box" id="chat"></div>

  <div class="input-box">
    <input type="text" id="input" placeholder="اكتب رسالتك...">
    <button onclick="send()">إرسال</button>
  </div>

  <script>
    function send() {
      let input = document.getElementById("input");
      let chat = document.getElementById("chat");

      let text = input.value.trim();
      if (!text) return;

      chat.innerHTML += <div class='msg user'>أنت: ${text}</div>;

      setTimeout(() => {
        chat.innerHTML += <div class='msg bot'>AI: ${getReply(text)}</div>;
        chat.scrollTop = chat.scrollHeight;
      }, 400);

      input.value = "";
    }

    function getReply(text) {
      text = text.toLowerCase();

      // تحيات
      if (text.includes("مرحبا") || text.includes("hello")) {
        return "أهلاً 👋 كيف أقدر أساعدك اليوم؟";
      }

      // تعريف
      if (text.includes("من أنت") || text.includes("اسمك")) {
        return "أنا مساعد ذكي مجاني داخل موقعك 🤖";
      }

      // PDF
      if (text.includes("pdf")) {
        return "تقدر تستخدم PDF Tools من الصفحة الرئيسية 📄";
      }

      // تعليم
      if (text.includes("تعلم") || text.includes("كيف")) {
        return "أنا أقدر أساعدك في الشرح خطوة خطوة 👍";
      }

      // برمجة
      if (text.includes("html")) {
        return "HTML هو لغة بناء صفحات الويب 🌐";
      }

      // افتراضي ذكي
      return "أنا أفهمك بشكل محدود الآن 🤖 لكن المشروع يتطور خطوة خطوة!";
    }
  </script>

</body>
</html>
