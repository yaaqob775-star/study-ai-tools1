<!DOCTYPE html>
<html>
<head>
  <title>AI Chat Pro</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0b1220;
      color: white;
    }

    header {
      background: #111827;
      padding: 18px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .chat-box {
      max-width: 520px;
      margin: 20px auto;
      background: #0f172a;
      padding: 15px;
      border-radius: 12px;
      height: 450px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      padding: 12px;
      border-radius: 12px;
      max-width: 80%;
      line-height: 1.5;
      word-wrap: break-word;
      font-size: 15px;
    }

    .user {
      background: #2563eb;
      align-self: flex-end;
      text-align: right;
    }

    .bot {
      background: #16a34a;
      align-self: flex-start;
      text-align: left;
      white-space: pre-line;
    }

    .input-box {
      display: flex;
      max-width: 520px;
      margin: auto;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    button {
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }

    .hint {
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      margin-top: 6px;
    }
  </style>
</head>

<body>

  <header>
    AI Chat Pro 🤖
  </header>

  <div class="chat-box" id="chat"></div>

  <div class="input-box">
    <input type="text" id="input" placeholder="اكتب سؤالك...">
    <button onclick="send()">إرسال</button>
  </div>

  <p class="hint">ذكاء اصطناعي متصل عبر OpenRouter</p>

  <script>
    function send() {
      let input = document.getElementById("input");
      let chat = document.getElementById("chat");

      let text = input.value.trim();
      if (!text) return;

      chat.innerHTML += <div class='msg user'>أنت: ${text}</div>;
      input.value = "";

      chat.innerHTML += <div class='msg bot'>جاري التفكير 🤖...</div>;
      chat.scrollTop = chat.scrollHeight;

      getReply(text).then(reply => {
        chat.innerHTML += <div class='msg bot'>${reply}</div>;
        chat.scrollTop = chat.scrollHeight;
      });
    }

    async function getReply(text) {
      try {
        let response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer a264cfa1-2682-5ca8-9324-891a848a8963"
          },
          body: JSON.stringify({
            model: "openrouter/auto",
            messages: [
              {
                role: "system",
                content: "أنت مساعد ذكي داخل تطبيق AI Tools Hub. اشرح بشكل بسيط ومفيد وبخطوات واضحة."
              },
              {
                role: "user",
                content: text
              }
            ]
          })
        });

        let data = await response.json();

        return data?.choices?.[0]?.message?.content || "ما قدرت أجيب رد 🤖";

      } catch (error) {
        return "حدث خطأ في الاتصال 🤖";
      }
    }
  </script>

</body>
</html>
