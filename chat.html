<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: white;
    }

    header {
      background: #111827;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .chat-box {
      max-width: 500px;
      margin: 20px auto;
      background: #1f2937;
      padding: 15px;
      border-radius: 12px;
      height: 420px;
      overflow-y: auto;
    }

    .msg {
      margin: 8px 0;
      padding: 8px;
      border-radius: 8px;
    }

    .user {
      text-align: right;
      background: #2563eb;
    }

    .bot {
      text-align: left;
      background: #16a34a;
    }

    .input-box {
      display: flex;
      max-width: 500px;
      margin: auto;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
    }

    button {
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

  <header>
    AI Chat 🤖 (Smart Upgrade)
  </header>

  <div class="chat-box" id="chat"></div>

  <div class="input-box">
    <input type="text" id="input" placeholder="اكتب رسالتك...">
    <button onclick="send()">إرسال</button>
  </div>

  <script>
    let memory = [];

    function send() {
      let input = document.getElementById("input");
      let chat = document.getElementById("chat");

      let text = input.value.trim();
      if (!text) return;

      memory.push(text);

      chat.innerHTML += <div class='msg user'>أنت: ${text}</div>;

      setTimeout(() => {
        chat.innerHTML += <div class='msg bot'>AI: ${getReply(text)}</div>;
        chat.scrollTop = chat.scrollHeight;
      }, 400);

      input.value = "";
    }

    function getReply(text) {
      text = text.toLowerCase();

      // ذاكرة بسيطة
      if (memory.length > 3) {
        if (text.includes("قلت")) {
          return "أنت قلت قبل: " + memory[memory.length - 2];
        }
      }

      // ردود أقوى
      if (text.includes("مرحبا") || text.includes("hello")) {
        return "أهلاً بك 👋 كيف أقدر أساعدك؟";
      }

      if (text.includes("اسمك")) {
        return "أنا مساعد ذكي مطوّر داخل موقعك 🤖";
      }

      if (text.includes("pdf")) {
        return "روح إلى PDF Tools من الصفحة الرئيسية 📄";
      }

      if (text.includes("تعلم")) {
        return "أنا أقدر أشرح لك أي شيء خطوة خطوة 👍";
      }

      if (text.includes("موقع")) {
        return "هذا مشروع AI Tools Hub خاص بك 🚀";
      }

      return "ما زلت أتعلم 🤖 لكني أصبح أذكى مع الوقت!";
    }
  </script>

</body>
</html>
