<!DOCTYPE html>
<html>
<head>
  <title>AI Tools Hub</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      background: #111827;
      padding: 20px;
      font-size: 26px;
      font-weight: bold;
    }

    .container {
      margin-top: 40px;
      display: grid;
      gap: 15px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .card {
      background: #1f2937;
      padding: 20px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      font-size: 18px;
      transition: 0.2s;
      display: block;
    }

    .card:hover {
      background: #2563eb;
      transform: scale(1.03);
    }

    .text {
      margin-top: 20px;
      color: #cbd5e1;
      font-size: 14px;
    }
  </style>
</head>

  </header>

    <a class="card" href="chat.html">🤖 AI Chat</a>

    <a class="card" href="image.html">🖼️ Image Tools</a>

</body>
</html>
