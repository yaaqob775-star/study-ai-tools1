<!DOCTYPE html>
<html>
<head>
  <title>AI Tools Hub</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
      text-align: center;
    }

    header {
      background: #111;
      color: white;
      padding: 20px;
      font-size: 26px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
      margin-top: 40px;
      padding: 20px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      text-decoration: none;
      color: black;
      font-size: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
      background: #007bff;
      color: white;
    }
  </style>
</head>

<body>

  <header>
    AI Tools Hub 🚀
  </header>

  <div class="grid">

    <a class="card" href="pdf.html">📄 PDF Tools</a>

    <a class="card" href="#" onclick="alert('قريباً AI Chat')">🤖 AI Chat</a>

    <a class="card" href="#" onclick="alert('قريباً Image Tools')">🖼️ Image Tools</a>

    <a class="card" href="#" onclick="alert('قريباً More Tools')">⚙️ More Tools</a>

  </div>

</body>
</html>
