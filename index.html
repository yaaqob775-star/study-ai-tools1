<!DOCTYPE html>
<html>
<head>
  <title>Study AI Tools</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f4f4;
    }

    button {
      margin: 5px;
      padding: 10px;
      cursor: pointer;
    }

    textarea {
      width: 300px;
    }
  </style>
</head>

<body>
  <h1>Study AI Tools 🚀</h1>
  <p>AI tools for students and pharmacy learning</p>

  <button>PDF Summarizer</button>
  <button>PDF to Word</button>
  <button>MCQ Generator</button>

  <br><br>

  <textarea id="inputText" placeholder="اكتب النص هنا..." rows="6" cols="40"></textarea>

  <br><br>

  <button onclick="summarize()">تلخيص النص</button>

  <p id="output"></p>

  <script>
    function summarize() {
      let text = document.getElementById("inputText").value;

      if(text.length === 0){
        document.getElementById("output").innerText = "اكتب نص أولاً";
      } else {
        document.getElementById("output").innerText =
          "ملخص: " + text.slice(0, 50) + "...";
      }
    }
  </script>

</body>
</html>
