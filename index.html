<!DOCTYPE html>
<html>
<head>
  <title>AI Tools Hub</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      background: #111827;
      padding: 20px;
      font-size: 26px;
      font-weight: bold;
    }

    .search {
      margin-top: 20px;
    }

    input {
      padding: 10px;
      width: 80%;
      max-width: 300px;
      border: none;
      border-radius: 8px;
    }

    .container {
      margin-top: 30px;
      display: grid;
      gap: 15px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .card {
      background: #1f2937;
      padding: 20px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      font-size: 18px;
      transition: 0.2s;
      display: block;
    }

    .card:hover {
      background: #2563eb;
      transform: scale(1.03);
    }
  </style>
</head>

<body>

  <header>
    AI Tools Hub 🚀
  </header>

  <div class="search">
    <input type="text" id="searchBox" placeholder="ابحث عن أداة..." onkeyup="searchTools()">
  </div>

  <div class="container" id="tools">

    <a class="card" href="pdf.html">📄 PDF Tools</a>

    <a class="card" href="chat.html">🤖 AI Chat</a>

    <a class="card" href="image.html">🖼️ Image Tools</a>

    <a class="card" href="#" onclick="alert('قريباً أدوات أكثر')">⚙️ More Tools</a>

  </div>

  <script>
    function searchTools() {
      let input = document.getElementById("searchBox").value.toLowerCase();
      let cards = document.querySelectorAll(".card");

      cards.forEach(card => {
        let text = card.textContent.toLowerCase();
        if (text.includes(input)) {
          card.style.display = "block";
        } else {
          card.style.display = "none";
        }
      });
    }
  </script>

</body>
</html>
