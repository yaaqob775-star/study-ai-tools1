<!DOCTYPE html>
<html>
<head>
  <title>AI Tools Hub</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0b1220;
      color: white;
    }

    header {
      background: #111827;
      padding: 18px;
      text-align: center;
      font-size: 22px;
      position: sticky;
      top: 0;
    }

    .search {
      padding: 15px;
      text-align: center;
    }

    input {
      padding: 10px;
      width: 85%;
      max-width: 300px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 15px;
      max-width: 500px;
      margin: auto;
    }

    .card {
      background: #1f2937;
      padding: 18px;
      border-radius: 14px;
      text-decoration: none;
      color: white;
      font-size: 18px;
      display: block;
      transition: 0.2s;
    }

    .card:hover {
      background: #2563eb;
      transform: scale(1.02);
    }

    .text {
      text-align: center;
      color: #94a3b8;
      font-size: 13px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <header>
    🚀 AI Tools Hub
  </header>

  <div class="search">
    <input type="text" id="searchBox" placeholder="ابحث عن أداة..." onkeyup="searchTools()">
  </div>

  <p class="text">
    تطبيق أدوات ذكية يمكن تثبيته على الجوال 📱
  </p>

  <div class="grid" id="tools">

    <a class="card" href="pdf.html">📄 PDF Tools</a>

    <a class="card" href="chat.html">🤖 AI Chat</a>

    <a class="card" href="image.html">🖼️ Image Tools</a>

    <a class="card" href="#" onclick="alert('قريباً أدوات أكثر')">⚙️ More Tools</a>

  </div>

  <script>
    function searchTools() {
      let input = document.getElementById("searchBox").value.toLowerCase();
      let cards = document.querySelectorAll(".card");

      cards.forEach(card => {
        let text = card.textContent.toLowerCase();
        card.style.display = text.includes(input) ? "block" : "none";
      });
    }
  </script>

  <!-- Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>

</body>
</html>
